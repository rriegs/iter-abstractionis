<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/slate.css">
        <title>Iter Abstractionis</title>
    </head>
    <body>
        <div id="CharacterSheet" class="sheet">
            <div class="w3-row-padding w3-stretch">
                <div class="w3-quarter">
                    <h4>Character Sheet</h4>
                </div>
                <div class="w3-quarter">
                    <div class="w3-section" style="position:relative;height:154px;width:100%">
                        <div class="w3-green" style="position:absolute;top:20%;left:30%;right:40%;bottom:30%"></div>
                        <div style="position:absolute;width:50%;left:0%;top:24px;bottom:24px;writing-mode:vertical-lr;border-style:solid;border-width:1px;border-color:transparent #eee transparent transparent;text-align:center">Lawful</div>
                        <div style="position:absolute;width:50%;right:0%;top:24px;bottom:24px;writing-mode:vertical-rl;border-style:solid;border-width:1px;border-color:transparent transparent transparent #eee;text-align:center">Chaotic</div>
                        <div style="position:absolute;height:50%;top:0%;left:24px;right:24px;border-style:solid;border-width:1px;border-color:transparent transparent #eee transparent;text-align:center">Good</div>
                        <div style="position:absolute;height:50%;bottom:0%;left:24px;right:24px;border-style:solid;border-width:1px;border-color:#eee transparent transparent transparent">
                            <div style="position:absolute;width:100%;bottom:0%;text-align:center">
                                Evil
                            </div>
                        </div>
                    </div>
                </div>
                <div class="w3-quarter">
                    <div class="w3-section">
                        <div class="entry">
                            Fire<span style="position:absolute;right:0%">Ice</span>
                            <div class="progress-bar">
                                <div class="progress w3-deep-orange" style="width:15%"></div>
                                <div class="progress-right w3-cyan" style="width:25%"></div>
                            </div>
                        </div>
                        <div class="entry">
                            Earth<span style="position:absolute;right:0%">Wind</span>
                            <div class="progress-bar">
                                <div class="progress w3-brown" style="width:60%"></div>
                                <div class="progress-right w3-light-green" style="width:10%"></div>
                            </div>
                        </div>
                        <div class="entry">
                            Water<span style="position:absolute;right:0%">Lightning</span>
                            <div class="progress-bar">
                                <div class="progress w3-blue" style="width:30%"></div>
                                <div class="progress-right w3-yellow" style="width:20%"></div>
                            </div>
                        </div>
                        <div class="entry">
                            Life<span style="position:absolute;right:0%">Death</span>
                            <div class="progress-bar">
                                <div class="progress w3-sand" style="width:20%"></div>
                                <div class="progress-right w3-black" style="width:80%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="w3-quarter">
                    <div class="w3-row-padding w3-stretch">
                        <div class="w3-col s6">
                            <div class="entry">
                                STR<span style="position:absolute;right:0%">5</span>
                                <div class="progress-bar">
                                    <div class="progress-bonus" style="width:100%"></div>
                                    <div class="progress" style="width:25%"></div>
                                </div>
                            </div>
                            <div class="entry">
                                CON<span style="position:absolute;right:0%">9</span>
                                <div class="progress-bar">
                                    <div class="progress-bonus" style="width:75%"></div>
                                    <div class="progress" style="width:35%"></div>
                                </div>
                            </div>
                            <div class="entry">
                                DEX<span style="position:absolute;right:0%">11</span>
                                <div class="progress-bar">
                                    <div class="progress-bonus" style="width:50%"></div>
                                    <div class="progress" style="width:40%"></div>
                                </div>
                            </div>
                            <div class="entry">
                                AGI<span style="position:absolute;right:0%">8</span>
                                <div class="progress-bar">
                                    <div class="progress-bonus" style="width:0%"></div>
                                    <div class="progress" style="width:80%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="w3-col s6">
                            <div class="entry">
                                INT<span style="position:absolute;right:0%">16</span>
                                <div class="progress-bar">
                                    <div class="progress-bonus" style="width:0%"></div>
                                    <div class="progress" style="width:20%"></div>
                                </div>
                            </div>
                            <div class="entry">
                                RES<span style="position:absolute;right:0%">10</span>
                                <div class="progress-bar">
                                    <div class="progress-bonus" style="width:75%"></div>
                                    <div class="progress" style="width:15%"></div>
                                </div>
                            </div>
                            <div class="entry">
                                CHA<span style="position:absolute;right:0%">12</span>
                                <div class="progress-bar">
                                    <div class="progress-bonus" style="width:90%"></div>
                                    <div class="progress" style="width:10%"></div>
                                </div>
                            </div>
                            <div class="entry">
                                PER<span style="position:absolute;right:0%">7</span>
                                <div class="progress-bar">
                                    <div class="progress-bonus" style="width:100%"></div>
                                    <div class="progress" style="width:15%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="w3-row-padding w3-stretch">
            <div class="w3-third">
                <div id="SkillSheet" class="sheet w3-panel" style="margin-top:0px">
                    <h4>Skills</h4>
                    <div class="entry tooltip">
                        <input type="range" class="slider" min="0" max="100" value="0">
                        <div class="w3-bar">
                            <button class="w3-bar-item w3-button"><i class="material-icons">expand_less</i></button>
                            <div class="w3-bar-item">Fireball</div>
                            <div class="w3-bar-item w3-right">5</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-bonus" style="width:30%"></div>
                            <div class="progress" style="width:10%"></div>
                        </div>
                        <div class="tooltiptext" style="width:300px">
                            Throw a ball of fire.
                        </div>
                    </div>
                    <div class="entry tooltip">
                        <input type="range" class="slider" min="0" max="100" value="0">
                        <div class="w3-bar">
                            <button class="w3-bar-item w3-button"><i class="material-icons">expand_less</i></button>
                            <div class="w3-bar-item">Ice Blast</div>
                            <div class="w3-bar-item w3-right">2</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-bonus" style="width:100%"></div>
                            <div class="progress" style="width:5%"></div>
                        </div>
                        <div class="tooltiptext" style="width:300px">
                            Throw a ball of fire.
                        </div>
                    </div>
                </div>
            </div>
            <div class="w3-third">
                <div id="QuestSheet" class="sheet" style="margin-top:0px">
                    <h4>Quests</h4>
                </div>
            </div>
            <div class="w3-third">
                <div id="InfoSheet" class="sheet" style="margin-top:0px">
                    <h4>Info</h4>
                </div>
            </div>
        </div>
    </body>
</html>
